schema_version: 1
module:
  name: nsx-utils
  type: runtime
  version: 0.1.1
support:
  ambiqsuite: true
  zephyr: false
summary: >-
  Shared utility helpers for common runtime tasks that do not justify a more
  specialized module.
capabilities:
  - utilities
  - shared_helpers
  - common_runtime_support
use_cases:
  - small cross-cutting helper needs
  - shared support code across app modules
  - utility functionality broader than one peripheral or board
agent_keywords:
  - utils
  - helpers
  - common
  - shared
build:
  cmake:
    package: nsx_utils
    targets:
      - nsx::utils
depends:
  required:
    - nsx-core
    - nsx-soc-hal
  optional:
    - nsx-harness
compatibility:
  boards:
    - '*'
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
    - armclang

    - atfe